<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NCAA D1 Men’s Live Scoreboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
    }

    h1 {
      text-align: center;
      margin-bottom: 12px;
      font-size: 22px;
    }

    .top-bar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    label {
      font-size: 14px;
    }

    input[type="date"], input[type="text"], select {
      padding: 6px 8px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #e6edf3;
    }

    button {
      padding: 6px 10px;
      font-size: 14px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #238636;
      color: white;
      white-space: nowrap;
    }

    button:hover {
      background: #2ea043;
    }

    .projection-toggle {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      align-items: center;
    }

    .projection-toggle span {
      font-weight: bold;
    }

    #scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
      margin-top: 10px;
    }

    .game-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .game-card:hover {
      transform: translateY(-1px);
      border-color: #58a6ff;
    }

    .game-main-row {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 8px;
    }

    .teams-column {
      flex: 1;
    }

    .team-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .team-name {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .team-logo {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      background: #0d1117;
      object-fit: contain;
    }

    .team-score {
      font-weight: bold;
      min-width: 24px;
      text-align: right;
      font-size: 14px;
    }

    .metrics-column {
      min-width: 120px;
      text-align: right;
      font-size: 14px;
    }

    .metric-line {
      white-space: nowrap;
    }

    .metric-label {
      margin-right: 4px;
    }

    .metric-value {
      display: inline-block;
      min-width: 40px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .status {
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.85;
    }

    .status.live {
      color: #ff4d4d;
      font-weight: bold;
    }

    .ou-section {
      margin-top: 8px;
      border-top: 1px solid #30363d;
      padding-top: 6px;
      font-size: 12px;
    }

    .ou-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .ou-row label {
      min-width: 55px;
    }

    .ou-row input[type="text"] {
      width: 60px;
      padding: 4px;
      font-size: 12px;
    }

    .ou-row select {
      padding: 3px 4px;
      font-size: 12px;
    }

    .trend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6e7681;
      display: inline-block;
      margin-left: 4px;
    }

    .trend-dot.green {
      background: #2ea043;
    }

    .trend-dot.red {
      background: #f85149;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      h1 {
        font-size: 18px;
      }
      .metrics-column {
        min-width: 100px;
      }
    }
  </style>
</head>

<body>
  <h1>NCAA D1 Men’s Live Scoreboard</h1>

  <div class="top-bar">
    <div class="controls">
      <label for="dateInput">Date:</label>
      <input id="dateInput" type="date" />
      <button id="refreshToggleBtn" onclick="toggleAutoRefresh()">Pause Auto-Refresh</button>
    </div>

    <div class="projection-toggle">
      <span>Projection Method:</span>
      <label>
        <input type="radio" name="projectionMethod" value="pace" checked onchange="updateAllTrends()" />
        Pace-Based (A)
      </label>
      <label>
        <input type="radio" name="projectionMethod" value="curve" onchange="updateAllTrends()" />
        Team-Adjusted Curve (C2)
      </label>
    </div>
  </div>

  <div id="scoreboard"></div>

  <script>
    let autoRefresh = null;
    let lastLoadedDate = null;

    const userBets = {};
    const teamStatsCache = {};
    const scoreboardGames = {};

    function initDate() {
      const input = document.getElementById("dateInput");
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      input.value = `${yyyy}-${mm}-${dd}`;
    }

    function getProjectionMethod() {
      const radios = document.querySelectorAll('input[name="projectionMethod"]');
      for (const r of radios) if (r.checked) return r.value;
      return "pace";
    }

    async function loadScoreboard() {
      const date = document.getElementById("dateInput").value;
      const res = await fetch(`/api/scoreboard?date=${date}`);

      if (!res.ok) {
        document.getElementById("scoreboard").innerHTML =
          `<p>Error loading scoreboard: HTTP ${res.status}</p>`;
        return;
      }

      const data = await res.json();
      renderScoreboard(data.games || []);
    }

    function toggleAutoRefresh() {
      const btn = document.getElementById("refreshToggleBtn");
      if (autoRefresh) {
        clearInterval(autoRefresh);
        autoRefresh = null;
        btn.textContent = "Resume Auto-Refresh";
      } else {
        autoRefresh = setInterval(refreshIncremental, 10000);
        btn.textContent = "Pause Auto-Refresh";
      }
    }

    function renderScoreboard(games) {
      const container = document.getElementById("scoreboard");
      container.innerHTML = "";
      Object.keys(scoreboardGames).forEach(k => delete scoreboardGames[k]);

      games.forEach(game => {
        scoreboardGames[game.id] = game;

        const comp = game.competitions?.[0];
        const teams = comp?.competitors || [];

        const home = teams.find(t => t.homeAway === "home") || teams[0];
        const away = teams.find(t => t.homeAway === "away") || teams[1];

        const homeName = home?.team?.shortDisplayName || home?.team?.displayName || "Home";
        const awayName = away?.team?.shortDisplayName || away?.team?.displayName || "Away";

        const homeScore = home?.score ?? "";
        const awayScore = away?.score ?? "";

        const homeLogo = home?.team?.logo || "";
        const awayLogo = away?.team?.logo || "";

        const statusText = comp?.status?.type?.shortDetail || "Scheduled";
        const isLive = comp?.status?.type?.state === "in";

        const state = extractGameStateFromScoreboard(game);
        const currentTotal = state.currentTotal ?? "";
        let currentPace = "";
        if (state.minutesPlayed && state.minutesPlayed > 0 && state.currentTotal != null) {
          currentPace = String(Math.round(state.currentTotal * (40 / state.minutesPlayed)));
        }

        const card = document.createElement("div");
        card.className = "game-card";
        card.dataset.gameId = game.id;

        const headerHtml = `
          <div class="game-main-row">
            <div class="teams-column">
              <div class="team-line">
                <div class="team-name">
                  ${awayLogo ? `<img class="team-logo" src="${awayLogo}" alt="">` : ""}
                  <span>${awayName}</span>
                </div>
                <div class="team-score">${awayScore}</div>
              </div>
              <div class="team-line">
                <div class="team-name">
                  ${homeLogo ? `<img class="team-logo" src="${homeLogo}" alt="">` : ""}
                  <span>${homeName}</span>
                </div>
                <div class="team-score">${homeScore}</div>
              </div>
            </div>
            <div class="metrics-column">
              <div class="metric-line">
                <span class="metric-label">Total:</span>
                <span class="metric-value" id="metric-total-${game.id}">
                  ${currentTotal === "" ? "-" : currentTotal}
                </span>
              </div>
              <div class="metric-line">
                <span class="metric-label">Pace:</span>
                <span class="metric-value" id="metric-pace-${game.id}">
                  ${currentPace === "" ? "-" : currentPace}
                </span>
              </div>
            </div>
          </div>
          <div class="status ${isLive ? "live" : ""}">${statusText}</div>
        `;

        const ouHtml = `
          <div class="ou-section">
            <div class="ou-row">
              <label>Game O/U</label>
              <input type="text" placeholder="Total"
                     oninput="updateUserBet('${game.id}','full','line',this.value)" />
              <select onchange="updateUserBet('${game.id}','full','side',this.value)">
                <option value="">Side</option>
                <option value="over">Over</option>
                <option value="under">Under</option>
              </select>
              <span id="trend-full-${game.id}" class="trend-dot"></span>
            </div>

            <div class="ou-row">
              <label>1H O/U</label>
              <input type="text" placeholder="Total"
                     oninput="updateUserBet('${game.id}','half1','line',this.value)" />
              <select onchange="updateUserBet('${game.id}','half1','side',this.value)">
                <option value="">Side</option>
                <option value="over">Over</option>
                <option value="under">Under</option>
              </select>
              <span id="trend-half1-${game.id}" class="trend-dot"></span>
            </div>

            <div class="ou-row">
              <label>2H O/U</label>
              <input type="text" placeholder="Total"
                     oninput="updateUserBet('${game.id}','half2','line',this.value)" />
              <select onchange="updateUserBet('${game.id}','half2','side',this.value)">
                <option value="">Side</option>
                <option value="over">Over</option>
                <option value="under">Under</option>
              </select>
              <span id="trend-half2-${game.id}" class="trend-dot"></span>
            </div>
          </div>
        `;

        card.innerHTML = headerHtml + ouHtml;
        container.appendChild(card);

        if (!userBets[game.id]) {
          userBets[game.id] = {
            full: { line: "", side: "" },
            half1: { line: "", side: "" },
            half2: { line: "", side: "" }
          };
        }
      });

      updateAllTrends();
    }

    function updateUserBet(gameId, segment, field, value) {
      if (!userBets[gameId]) {
        userBets[gameId] = {
          full: { line: "", side: "" },
          half1: { line: "", side: "" },
          half2: { line: "", side: "" }
        };
      }
      userBets[gameId][segment][field] = value;
      const game = scoreboardGames[gameId];
      if (game) updateTrendForGame(gameId, game);
    }

    function updateAllTrends() {
      Object.keys(userBets).forEach(gameId => {
        const game = scoreboardGames[gameId];
        if (game) updateTrendForGame(gameId, game);
      });
    }

    async function updateTrendForGame(gameId, game) {
      const bets = userBets[gameId];
      if (!bets) return;

      const state = extractGameStateFromScoreboard(game);
      if (!state) return;

      const method = getProjectionMethod();

      if (method === "curve") {
        await ensureTeamStatsFromGame(game);
      }

      const totalEl = document.getElementById(`metric-total-${gameId}`);
      const paceEl = document.getElementById(`metric-pace-${gameId}`);
      if (totalEl && state.currentTotal != null) {
        totalEl.textContent = state.currentTotal;
      }
      if (paceEl && state.minutesPlayed && state.minutesPlayed > 0 && state.currentTotal != null) {
        const pace = Math.round(state.currentTotal * (40 / state.minutesPlayed));
        paceEl.textContent = pace;
      }

      applyTrendDot(gameId, "full", bets.full, state, method);
      applyTrendDot(gameId, "half1", bets.half1, state, method, "first");
      applyTrendDot(gameId, "half2", bets.half2, state, method, "second");
    }

    function applyTrendDot(gameId, segmentKey, bet, state, method, halfSegment) {
      const dot = document.getElementById(`trend-${segmentKey}-${gameId}`);
      if (!dot) return;

      dot.classList.remove("green", "red");

      const line = parseFloat(bet.line);
      const side = bet.side;

      if (!line || !side || !state.minutesPlayed || state.currentTotal == null) {
        return;
      }

      let projected;
      if (method === "pace") {
        projected = projectTotalPaceBased(state, segmentKey, halfSegment);
      } else {
        projected = projectTotalCurveBased(state, segmentKey, halfSegment);
      }

      if (projected == null) return;

      const isOver = side === "over";
      const good = isOver ? projected > line : projected < line;

      if (good) dot.classList.add("green");
      else dot.classList.add("red");
    }

    function projectTotalPaceBased(state, segmentKey, halfSegment) {
      const { minutesPlayed, currentTotal } = state;
      if (minutesPlayed <= 0) return null;

      if (segmentKey === "full") {
        return currentTotal * (40 / minutesPlayed);
      }

      if (halfSegment === "first") {
        if (minutesPlayed > 20) return null;
        return currentTotal * (20 / minutesPlayed);
      }

      if (halfSegment === "second") {
        if (minutesPlayed <= 20) return null;
        const minutesInSecond = minutesPlayed - 20;
        if (minutesInSecond <= 0) return null;
        const rate = currentTotal / minutesPlayed;
        return rate * 20;
      }

      return null;
    }

    function projectTotalCurveBased(state, segmentKey, halfSegment) {
      const { minutesPlayed, currentTotal, homeTeamId, awayTeamId } = state;
      if (minutesPlayed <= 0) return null;

      const homeStats = teamStatsCache[homeTeamId];
      const awayStats = teamStatsCache[awayTeamId];
      if (!homeStats || !awayStats) return null;

      const expectedTotalFull = homeStats.expectedTotal + awayStats.expectedTotal;

      let expectedAtMinute;
      if (segmentKey === "full") {
        expectedAtMinute = expectedTotalFull * (minutesPlayed / 40);
      } else if (halfSegment === "first") {
        if (minutesPlayed > 20) return null;
        const expectedFirstHalf = expectedTotalFull * 0.5;
        expectedAtMinute = expectedFirstHalf * (minutesPlayed / 20);
      } else if (halfSegment === "second") {
        if (minutesPlayed <= 20) return null;
        const minutesInSecond = minutesPlayed - 20;
        if (minutesInSecond <= 0) return null;
        const expectedSecondHalf = expectedTotalFull * 0.5;
                expectedAtMinute = expectedSecondHalf * (minutesInSecond / 20);
      } else {
        return null;
      }

      const ratio = currentTotal / Math.max(expectedAtMinute, 1e-6);
      const impliedFinal = expectedTotalFull * ratio;
      return impliedFinal;
    }

    /* ---------------------------------------------------------
       INCREMENTAL REFRESH (only updates scores, totals, pace, dots)
    --------------------------------------------------------- */
    async function refreshIncremental() {
      const date = document.getElementById("dateInput").value;

      // If user changed date mid-cycle, do nothing (onDateChange handles it)
      if (date !== lastLoadedDate) return;

      const res = await fetch(`/api/scoreboard?date=${date}`);
      if (!res.ok) return;

      const data = await res.json();
      const games = data.games || [];

      // Update only existing games
      games.forEach(game => {
        const id = game.id;
        if (!scoreboardGames[id]) return; // ignore games not in current date

        scoreboardGames[id] = game;
        updateTrendForGame(id, game);
      });
    }

    /* ---------------------------------------------------------
       DATE CHANGE HANDLER — FULL RESET
    --------------------------------------------------------- */
    async function onDateChange() {
      const newDate = document.getElementById("dateInput").value;

      // If the user actually changed the date → FULL RESET
      if (newDate !== lastLoadedDate) {
        clearInterval(autoRefresh);
        autoRefresh = null;

        // wipe user inputs
        Object.keys(userBets).forEach(k => delete userBets[k]);

        // wipe game state
        Object.keys(scoreboardGames).forEach(k => delete scoreboardGames[k]);

        // clear UI immediately so no mixed dates appear
        document.getElementById("scoreboard").innerHTML = "";

        // load new date's games
        await loadScoreboard();

        // start fresh 10-second refresh loop
        autoRefresh = setInterval(refreshIncremental, 10000);

        lastLoadedDate = newDate;
      }
    }

    /* ---------------------------------------------------------
       INIT
    --------------------------------------------------------- */
    document.getElementById("dateInput").addEventListener("change", onDateChange);

    initDate();
    lastLoadedDate = document.getElementById("dateInput").value;

    // initial full load
    loadScoreboard();

    // start 10-second incremental refresh
    autoRefresh = setInterval(refreshIncremental, 10000);
  </script>
</body>
</html>
