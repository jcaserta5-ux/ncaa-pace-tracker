<!DOCTYPE html>
<html>
<head>
  <title>NCAA Games Today</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .game { background: white; padding: 12px; margin-bottom: 10px; border-radius: 6px; }
    .teams { font-size: 18px; font-weight: bold; }
    .meta { color: #555; margin-top: 4px; }
  </style>
</head>
<body>

<h1>Today's NCAA Division I Games</h1>
<div id="games">Loading…</div>

<script>
async function loadGames() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');

    const url = `https://data.ncaa.com/casablanca/scoreboard/basketball-men/d1/${yyyy}/${mm}/${dd}/scoreboard.json`;

    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("Bad response");
        const data = await res.json();

        const container = document.getElementById("games");
        container.innerHTML = "";

        if (!data.games || data.games.length === 0) {
            container.innerHTML = "<p>No games today.</p>";
            return;
        }

        data.games.forEach(g => {
            const div = document.createElement("div");
            div.className = "game";

            const home = g.home.names.short;
            const away = g.away.names.short;
            const time = g.startTime;
            const tv = g.broadcast ? g.broadcast : "TBD";

            div.innerHTML = `
                <div class="teams">${away} @ ${home}</div>
                <div class="meta">Tip: ${time} | TV: ${tv}</div>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        document.getElementById("games").innerHTML =
            "<p>Error loading NCAA data.</p>";
        console.error(err);
    }
}

// Load immediately + refresh every 60 seconds
loadGames();
setInterval(loadGames, 60000);
</script>

</body>
</html>
