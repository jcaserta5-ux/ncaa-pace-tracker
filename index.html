<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NCAA Pace Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- PWA bits (for Option 2) -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PaceTracker">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body {
font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
padding: 20px;
background: #111;
color: #eee;
max-width: 480px;
margin: 0 auto;
}
h1 {
font-size: 1.6rem;
margin-bottom: 12px;
}
label {
display: block;
margin: 8px 0 4px;
font-size: 0.9rem;
}
select, input {
padding: 8px;
margin-bottom: 10px;
width: 100%;
border-radius: 6px;
border: 1px solid #444;
background: #181818;
color: #eee;
}
button {
padding: 10px 14px;
cursor: pointer;
border-radius: 6px;
border: none;
background: #2563eb;
color: #fff;
font-weight: 600;
margin-top: 4px;
}
button:active {
transform: scale(0.98);
}
.good { color: #22c55e; }
.bad { color: #f97373; }
.card {
border: 1px solid #333;
padding: 16px;
border-radius: 10px;
margin-top: 16px;
background: #181818;
font-size: 0.95rem;
}
.row { margin: 4px 0; }
</style>
</head>
<body>
<h1>NCAA Hoops Pace Tracker</h1>

<div>
<label for="date">Date</label>
<input id="date" type="date" />

<button id="loadGames">Load Games</button>

<label for="gameSelect">Game</label>
<select id="gameSelect">
<option value="">-- select a game --</option>
</select>

<label for="line">Over/Under Line (total points)</label>
<input id="line" type="number" step="0.5" placeholder="e.g. 147.5" />

<label for="pick">Your Pick</label>
<select id="pick">
<option value="over">Over</option>
<option value="under">Under</option>
</select>

<button id="start">Start Tracking</button>
</div>

<div id="output" class="card" style="display:none;">
<div class="row" id="matchup"></div>
<div class="row" id="state"></div>
<div class="row" id="score"></div>
<div class="row" id="pace"></div>
<div class="row" id="status"></div>
</div>

<script>
const API_BASE = 'https://ncaa-api.henrygd.me';

const dateInput = document.getElementById('date');
const loadGamesBtn = document.getElementById('loadGames');
const gameSelect = document.getElementById('gameSelect');
const lineInput = document.getElementById('line');
const pickSelect = document.getElementById('pick');
const startBtn = document.getElementById('start');

const output = document.getElementById('output');
const matchupEl = document.getElementById('matchup');
const stateEl = document.getElementById('state');
const scoreEl = document.getElementById('score');
const paceEl = document.getElementById('pace');
const statusEl = document.getElementById('status');

let pollInterval = null;
let selectedGame = null;

function formatDateForScoreboard(dateStr) {
const [y, m, d] = dateStr.split('-');
return `${y}/${m}/${d}`;
}

async function loadGames() {
const date = dateInput.value;
if (!date) {
alert('Pick a date first.');
return;
}

const pathDate = formatDateForScoreboard(date);
const url = `${API_BASE}/scoreboard/basketball-men/d1/${pathDate}/all-conf`;

gameSelect.innerHTML = '<option value="">Loading…</option>';

try {
const res = await fetch(url);
if (!res.ok) throw new Error('Failed to fetch games');
const data = await res.json();

const games = data.games || [];
if (!games.length) {
gameSelect.innerHTML = '<option value="">No games found</option>';
return;
}

gameSelect.innerHTML = '<option value="">-- select a game --</option>';
games.forEach((g, idx) => {
const game = g.game;
const opt = document.createElement('option');
opt.value = idx;
opt.textContent = `${game.away.names.short} @ ${game.home.names.short} (${game.startTime})`;
opt.dataset.gameId = game.gameID;
gameSelect.appendChild(opt);
});

gameSelect._games = games;
} catch (e) {
console.error(e);
gameSelect.innerHTML = '<option value="">Error loading games</option>';
}
}

function parseClockToMinutesLeft(clockStr) {
if (!clockStr || !clockStr.includes(':')) return null;
const [m, s] = clockStr.split(':').map(Number);
return m + s / 60;
}

function computePace(game, line, pick) {
const homeScore = Number(game.home.score || 0);
const awayScore = Number(game.away.score || 0);
const totalPoints = homeScore + awayScore;

const period = game.currentPeriod || '';
const clock = game.contestClock || '';
const gameState = game.gameState || '';

if (gameState === 'final') {
const projected = totalPoints;
return { projected, totalPoints, elapsed: 40, period, clock, gameState };
}

const minutesLeft = parseClockToMinutesLeft(clock);
if (minutesLeft == null) {
return { projected: null, totalPoints, elapsed: null, period, clock, gameState };
}

let elapsed;
const p = period.toLowerCase();
if (p.includes('1st')) {
elapsed = 20 - minutesLeft;
} else if (p.includes('2nd')) {
elapsed = 20 + (20 - minutesLeft);
} else {
elapsed = 40 - minutesLeft;
}

if (elapsed <= 0) {
return { projected: null, totalPoints, elapsed: 0, period, clock, gameState };
}

const projected = totalPoints * (40 / elapsed);
return { projected, totalPoints, elapsed, period, clock, gameState };
}

function getColorClass(projected, line, pick) {
if (projected == null || !isFinite(projected)) return '';
const lineNum = Number(line);
if (!isFinite(lineNum)) return '';

if (pick === 'over') {
return projected > lineNum ? 'good' : 'bad';
} else {
return projected < lineNum ? 'good' : 'bad';
}
}

async function pollGame() {
if (!selectedGame) return;
const line = lineInput.value;
const pick = pickSelect.value;

try {
const date = dateInput.value;
const pathDate = formatDateForScoreboard(date);
const url = `${API_BASE}/scoreboard/basketball-men/d1/${pathDate}/all-conf`;
const res = await fetch(url);
if (!res.ok) throw new Error('Failed to fetch game');
const data = await res.json();

const games = data.games || [];
const gameObj = games.map(g => g.game)
.find(g => g.gameID === selectedGame.gameID);

if (!gameObj) {
statusEl.textContent = 'Game not found on refresh.';
return;
}

const { projected, totalPoints, elapsed, period, clock, gameState } =
computePace(gameObj, line, pick);

output.style.display = 'block';
matchupEl.textContent = `${gameObj.away.names.full} @ ${gameObj.home.names.full}`;
stateEl.textContent = `State: ${gameState.toUpperCase()} | Period: ${period} | Clock: ${clock || 'N/A'}`;
scoreEl.textContent = `Score: ${gameObj.away.score} - ${gameObj.home.score} (Total: ${totalPoints})`;

if (projected == null) {
paceEl.textContent = 'Pace: waiting for live clock / game in progress…';
paceEl.className = '';
} else {
const cls = getColorClass(projected, line, pick);
paceEl.className = cls;
paceEl.textContent =
`Projected Total: ${projected.toFixed(1)} vs Line ${line} (${pick.toUpperCase()})`;
}

if (gameState === 'final') {
statusEl.textContent = 'Game is FINAL. Stopping auto-update.';
if (pollInterval) clearInterval(pollInterval);
} else {
statusEl.textContent = 'Auto-updating every 15 seconds…';
}
} catch (e) {
console.error(e);
statusEl.textContent = 'Error updating game.';
}
}

loadGamesBtn.addEventListener('click', loadGames);

startBtn.addEventListener('click', () => {
const idx = gameSelect.value;
const line = lineInput.value;
const pick = pickSelect.value;

if (idx === '' || !gameSelect._games) {
alert('Select a game first.');
return;
}
if (!line) {
alert('Enter an over/under line.');
return;
}

selectedGame = gameSelect._games[idx].game;

if (pollInterval) clearInterval(pollInterval);
pollGame();
pollInterval = setInterval(pollGame, 15000);
});

// Optional: register service worker if present
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js').catch(console.error);
}
</script>
</body>
</html>
