<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NCAA Pace Tracker</title>

<style>
  body {
    background: #0b0e11;
    color: #f5f5f5;
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 20px;
  }

  h1 { margin-top: 0; }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-top: 20px;
  }

  .game-card {
    background: #161a1e;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.15s;
  }

  .game-card:hover {
    background: #1f2429;
    transform: translateY(-2px);
  }

  .team-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }

  .team-row img {
    width: 28px;
    height: 28px;
    margin-right: 8px;
  }

  .team-score {
    margin-left: auto;
    font-weight: bold;
  }

  pre {
    background: #111418;
    padding: 20px;
    border-radius: 12px;
    margin-top: 30px;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
</head>

<body>

<h1>NCAA Pace Tracker</h1>

<div id="scoreboard" class="scoreboard"></div>

<pre id="gameDetails">(click a game to load details)</pre>

<script>
// ------------------------------------------------------------
// LOAD SCOREBOARD (original working version)
// ------------------------------------------------------------
async function loadScoreboard() {
  const res = await fetch("/api/scoreboard"); // backend now defaults to today
  const data = await res.json();

  const container = document.getElementById("scoreboard");
  container.innerHTML = "";

  if (!data.events || data.events.length === 0) {
    container.innerHTML = "<div>No games found.</div>";
    return;
  }

  data.events.forEach(event => {
    const comp = event.competitions[0];
    const teams = comp.competitors;

    const away = teams.find(t => t.homeAway === "away");
    const home = teams.find(t => t.homeAway === "home");

    const card = document.createElement("div");
    card.className = "game-card";
    card.onclick = () => loadGame(event.id);

    card.innerHTML = `
      <div class="team-row">
        <img src="${away.team.logo}" />
        <div>${away.team.shortDisplayName}</div>
        <div class="team-score">${away.score ?? ""}</div>
      </div>

      <div class="team-row">
        <img src="${home.team.logo}" />
        <div>${home.team.shortDisplayName}</div>
        <div class="team-score">${home.score ?? ""}</div>
      </div>
    `;

    container.appendChild(card);
  });
}

// ------------------------------------------------------------
// LOAD GAME DETAILS (original working version)
// ------------------------------------------------------------
async function loadGame(id) {
  const res = await fetch(`/api/game/${id}`);
  const data = await res.json();

  document.getElementById("gameDetails").textContent =
    JSON.stringify(data, null, 2);
}

// ------------------------------------------------------------
// INITIAL LOAD
// ------------------------------------------------------------
loadScoreboard();
</script>

</body>
</html>
