<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NCAA D1 Men’s Live Scoreboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      font-size: 16px;
      border-radius: 4px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #e6edf3;
    }

    button {
      padding: 8px 14px;
      font-size: 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #238636;
      color: white;
    }

    button:hover {
      background: #2ea043;
    }

    #scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .game-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .game-card:hover {
      transform: scale(1.02);
      border-color: #58a6ff;
    }

    .team-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .status {
      margin-top: 8px;
      font-size: 14px;
      opacity: 0.8;
    }

    .status.live {
      color: #ff4d4d;
      font-weight: bold;
    }

    #game-json {
      margin-top: 30px;
      white-space: normal;
      background: #161b22;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #30363d;
    }
  </style>
</head>

<body>
  <h1>NCAA D1 Men’s Live Scoreboard</h1>

  <div class="controls">
    <label>Date (YYYY-MM-DD):</label>
    <input id="dateInput" type="text" value="2026-03-29" />
    <button onclick="loadScoreboard()">Load Scoreboard</button>
    <button onclick="toggleAutoRefresh()">Toggle Auto-Refresh (10s)</button>
  </div>

  <div id="scoreboard"></div>

  <h2>Game Details</h2>
  <div id="game-json">Click a game card to load details…</div>

  <script>
    let autoRefresh = null;

    async function loadScoreboard() {
      const date = document.getElementById("dateInput").value;
      const res = await fetch(`/api/scoreboard?date=${date}`);

      if (!res.ok) {
        document.getElementById("scoreboard").innerHTML =
          `<p>Error loading scoreboard: HTTP ${res.status}</p>`;
        return;
      }

      const data = await res.json();
      renderScoreboard(data.games);
    }

    function toggleAutoRefresh() {
      if (autoRefresh) {
        clearInterval(autoRefresh);
        autoRefresh = null;
        alert("Auto-refresh OFF");
      } else {
        autoRefresh = setInterval(loadScoreboard, 10000);
        alert("Auto-refresh ON (10s)");
      }
    }

    function renderScoreboard(games) {
      const container = document.getElementById("scoreboard");
      container.innerHTML = "";

      games.forEach(game => {
        const comp = game.competitions?.[0];
        const teams = comp?.competitors || [];

        const home = teams.find(t => t.homeAway === "home") || teams[0];
        const away = teams.find(t => t.homeAway === "away") || teams[1];

        const homeName = home?.team?.displayName || "Home";
        const awayName = away?.team?.displayName || "Away";

        const homeScore = home?.score ?? "";
        const awayScore = away?.score ?? "";

        const statusText = comp?.status?.type?.shortDetail || "Scheduled";
        const isLive = comp?.status?.type?.state === "in";

        const card = document.createElement("div");
        card.className = "game-card";
        card.dataset.gameId = game.id;

        card.innerHTML = `
          <div class="team-row">
            <span>${awayName}</span>
            <span>${awayScore}</span>
          </div>
          <div class="team-row">
            <span>${homeName}</span>
            <span>${homeScore}</span>
          </div>
          <div class="status ${isLive ? "live" : ""}">${statusText}</div>
        `;

        card.addEventListener("click", () => loadGameDetails(game.id));
        container.appendChild(card);
      });
    }

    // ⭐⭐⭐ ONLY THIS FUNCTION IS CHANGED ⭐⭐⭐
    async function loadGameDetails(id) {
      const res = await fetch(`/api/game/${id}`);

      if (!res.ok) {
        document.getElementById("game-json").textContent =
          `Error loading game: HTTP ${res.status}`;
        return;
      }

      const data = await res.json();

      const teams = data.teams || [];
      const away = teams.find(t => t.homeAway === "away") || teams[0];
      const home = teams.find(t => t.homeAway === "home") || teams[1];

      // Scores
      let awayScore = "";
      let homeScore = "";

      if (data.source === "espn-v2") {
        awayScore = away?.score ?? "";
        homeScore = home?.score ?? "";
      } else {
        const boxTeams = data.boxscore?.teams || [];
        awayScore = boxTeams.find(t => t.homeAway === "away")?.score ?? "";
        homeScore = boxTeams.find(t => t.homeAway === "home")?.score ?? "";
      }

      const isLive = data.status?.includes("IN_PROGRESS");

      const clock = data.clock || "";
      const period = data.period || "";
      const possession = data.possession || "";

      let pace = null;
      if (data.boxscore?.teams?.length === 2) {
        const t1 = data.boxscore.teams[0].statistics;
        const t2 = data.boxscore.teams[1].statistics;
        const poss = (calcPoss(t1) + calcPoss(t2)) / 2;
        pace = Math.round(poss);
      }

      document.getElementById("game-json").innerHTML = `
        <div style="display:flex;align-items:center;margin-bottom:10px;">
          <img src="${away.team.logo}" style="width:40px;height:40px;margin-right:10px;">
          <div>${away.team.name}</div>
          <div style="margin-left:auto;font-size:24px;font-weight:bold;">${awayScore}</div>
        </div>

        <div style="display:flex;align-items:center;margin-bottom:10px;">
          <img src="${home.team.logo}" style="width:40px;height:40px;margin-right:10px;">
          <div>${home.team.name}</div>
          <div style="margin-left:auto;font-size:24px;font-weight:bold;">${homeScore}</div>
        </div>

        <div style="opacity:0.8;margin-top:10px;">
          ${isLive ? "<strong style='color:#ff4d4d;'>LIVE</strong> • " : ""}
          Status: ${data.status}
          ${period ? ` • Period: ${period}` : ""}
          ${clock ? ` • Clock: ${clock}` : ""}
          ${possession ? ` • Possession: ${possession}` : ""}
        </div>

        <div style="opacity:0.8;margin-top:10px;">
          ${pace ? `Estimated Pace: ${pace} possessions` : ""}
        </div>
      `;
    }

    function calcPoss(stats) {
      if (!stats) return 0;

      const get = name => {
        const s = stats.find(x => x.name === name);
        return s ? Number(s.displayValue) : 0;
      };

      const fga = get("fieldGoalsAttempted");
      const to = get("turnovers");
      const fta = get("freeThrowsAttempted");
      const orb = get("offensiveRebounds");

      return fga + to + 0.44 * fta - orb;
    }

    loadScoreboard();
  </script>
</body>
</html>
