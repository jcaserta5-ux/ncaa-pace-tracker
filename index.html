<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NCAA Pace Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PaceTracker">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body {
font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
padding: 20px;
background: #111;
color: #eee;
max-width: 480px;
margin: 0 auto;
}
h1 {
font-size: 1.6rem;
margin-bottom: 12px;
}
label {
display: block;
margin: 8px 0 4px;
font-size: 0.9rem;
}
select, input {
padding: 8px;
margin-bottom: 10px;
width: 100%;
border-radius: 6px;
border: 1px solid #444;
background: #181818;
color: #eee;
}
button {
padding: 10px 14px;
cursor: pointer;
border-radius: 6px;
border: none;
background: #2563eb;
color: #fff;
font-weight: 600;
margin-top: 4px;
width: 100%;
}
button:active {
transform: scale(0.98);
}
.good { color: #22c55e; }
.bad { color: #f97373; }
.card {
border: 1px solid #333;
padding: 16px;
border-radius: 10px;
margin-top: 16px;
background: #181818;
font-size: 0.95rem;
}
.row { margin: 4px 0; }
</style>
</head>
<body>
<h1>NCAA Hoops Pace Tracker</h1>

<div>
<label for="date">Date</label>
<input id="date" type="date" />

<button id="loadGames">Load Games</button>

<label for="gameSelect">Game</label>
<select id="gameSelect">
<option value="">-- select a game --</option>
</select>

<label for="line">Over/Under Line (total points)</label>
<input id="line" type="number" step="0.5" placeholder="e.g. 147.5" />

<label for="pick">Your Pick</label>
<select id="pick">
<option value="over">Over</option>
<option value="under">Under</option>
</select>

<button id="start">Start Tracking</button>
</div>

<div id="output" class="card" style="display:none;">
<div class="row" id="matchup"></div>
<div class="row" id="state"></div>
<div class="row" id="score"></div>
<div class="row" id="pace"></div>
<div class="row" id="status"></div>
</div>

const startBtn = document.getElementById('start');

const stateEl = document.getElementById('state');

return `https://www.ncaa.com/scoreboard/basketball-men/d1/${yyyy}/${mm}/${dd}`;
}
