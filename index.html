<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NCAA D1 Men's Live Scoreboard</title>

  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
      font-weight: bold;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    #dateInput {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 6px 10px;
      border-radius: 4px;
    }

    #refreshToggleBtn {
      background: #238636;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #projectionMethod {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }

    .game-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .game-main-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ⭐ TEAM COLUMN CAN SHRINK SAFELY */
    .teams-column {
      flex: 1;
      min-width: 0;
    }

    .team-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .team-name {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      font-weight: bold;
      min-width: 0;
    }

    .team-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    /* ⭐ PERFECT COLUMN ALIGNMENT: 1H | 2H | OT | TOTAL */
    .team-score-block {
      display: grid;
      grid-template-columns: 32px 32px 32px 40px;
      justify-items: right;
      gap: 10px;
      min-width: 150px;
      font-variant-numeric: tabular-nums;
    }

    .half-score {
      font-size: 15px;
      opacity: 0.85;
    }

    .team-score {
      font-size: 20px;
      font-weight: bold;
    }

    /* ⭐ TOTALS ROW */
    .totals-row {
      display: grid;
      grid-template-columns: 60px 32px 32px 32px 40px;
      justify-items: right;
      gap: 10px;
      padding-top: 6px;
      border-top: 1px solid #30363d;
      font-variant-numeric: tabular-nums;
    }

    .totals-label {
      justify-self: left;
      opacity: 0.85;
    }

    /* ⭐ NEW PACE ROW (1H | 2H | Game) */
    .pace-row {
      display: grid;
      grid-template-columns: 60px 32px 32px 40px;
      justify-items: right;
      gap: 10px;
      padding-top: 4px;
      border-top: 1px solid #30363d;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .pace-label {
      justify-self: left;
      opacity: 0.85;
    }

    .status {
      font-size: 14px;
      opacity: 0.8;
    }

    .status.live {
      color: #2ea043;
      font-weight: bold;
    }

    /* O/U SECTION */
    .ou-section {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ou-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ou-row label {
      width: 70px;
      font-size: 14px;
    }

    .ou-row input,
    .ou-row select {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 4px 6px;
      border-radius: 4px;
    }

    .trend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      margin-left: 4px;
    }

    .trend-dot.green {
      background: #2ea043;
    }

    .trend-dot.red {
      background: #f85149;
    }

    .ou-graph {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px;
    }
  </style>
</head>
<body>

<h1>NCAA D1 Men's Live Scoreboard</h1>

<div id="controls">
  <div>
    Date:
    <input type="date" id="dateInput" />
  </div>

  <button id="refreshToggleBtn">Pause Auto-Refresh</button>

  <div id="projectionMethod">
    Projection Method:
    <label><input type="radio" name="projectionMethod" value="pace" checked /> Pace-Based (A)</label>
    <label><input type="radio" name="projectionMethod" value="curve" /> Team-Adjusted Curve (C2)</label>
  </div>
</div>

<div id="scoreboard"></div>



<script>
let autoRefresh = null;
let scoreboardGames = {};
let userBets = {};
let projectionHistory = {};
let teamStatsCache = {};

/* -------------------------------
   SAFE SCORE NORMALIZATION
--------------------------------*/
function safeScore(val) {
  if (val === null || val === undefined) return null;
  const n = Number(val);
  return isNaN(n) ? null : n;
}

/* -------------------------------
   INIT DATE + LOAD SCOREBOARD
--------------------------------*/
function initDate() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  document.getElementById("dateInput").value = `${yyyy}-${mm}-${dd}`;
}

document.getElementById("dateInput").addEventListener("change", loadScoreboard);

document.getElementById("refreshToggleBtn").addEventListener("click", () => {
  if (autoRefresh) {
    clearInterval(autoRefresh);
    autoRefresh = null;
    document.getElementById("refreshToggleBtn").textContent = "Resume Auto-Refresh";
  } else {
    autoRefresh = setInterval(loadScoreboard, 5000);
    document.getElementById("refreshToggleBtn").textContent = "Pause Auto-Refresh";
  }
});

/* -------------------------------
   FETCH SCOREBOARD
--------------------------------*/
async function loadScoreboard() {
  const date = document.getElementById("dateInput").value;
  if (!date) return;

  const url = `/api/scoreboard?date=${date}`;
  try {
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();

    const games = data.games || [];
    scoreboardGames = {};

    const container = document.getElementById("scoreboard");
    container.innerHTML = "";

    games.forEach(game => {
      const id = game.id;
      scoreboardGames[id] = game;
      container.appendChild(renderGameCard(game));
    });

    updateAllTrends();
  } catch (err) {
    console.error("Scoreboard load error:", err);
  }
}

/* -------------------------------
   RENDER GAME CARD
--------------------------------*/
function renderGameCard(game) {
  const card = document.createElement("div");
  card.className = "game-card";
  card.dataset.gameId = game.id;

  const comp = game.competitions?.[0];
  const teams = comp?.competitors || [];

  const away = teams.find(t => t.homeAway === "away") || teams[0];
  const home = teams.find(t => t.homeAway === "home") || teams[1];

  const awayLogo = away?.team?.logo;
  const homeLogo = home?.team?.logo;

  const awayName = away?.team?.shortDisplayName || "Away";
  const homeName = home?.team?.shortDisplayName || "Home";

  const awayLines = away?.linescores || [];
  const homeLines = home?.linescores || [];

  /* ⭐ SAFE SCORING */
  const away1 = safeScore(awayLines[0]?.value);
  const away2 = safeScore(awayLines[1]?.value);
  const awayOT = safeScore(awayLines[2]?.value);

  const home1 = safeScore(homeLines[0]?.value);
  const home2 = safeScore(homeLines[1]?.value);
  const homeOT = safeScore(homeLines[2]?.value);

  const awayTotal = safeScore(away?.score);
  const homeTotal = safeScore(home?.score);

  /* ⭐ TOTALS (safe) */
  const total1 = (away1 != null && home1 != null) ? away1 + home1 : "-";
  const total2 = (away2 != null && home2 != null) ? away2 + home2 : "-";
  const totalOT = (awayOT != null && homeOT != null) ? awayOT + homeOT : "-";
  const totalGame = (awayTotal != null && homeTotal != null) ? awayTotal + homeTotal : "-";

  const status = comp?.status;

  /* -------------------------------
     BUILD CARD HTML
  --------------------------------*/
  card.innerHTML = `
    <div class="game-main-row">

      <!-- TEAM 1 -->
      <div class="team-line">
        <div class="team-name">
          <img src="${awayLogo}" class="team-logo" />
          ${awayName}
        </div>
        <div class="team-score-block">
          <span class="half-score">${away1 ?? "-"}</span>
          <span class="half-score">${away2 ?? "-"}</span>
          <span class="half-score">${awayOT ?? "-"}</span>
          <span class="team-score">${awayTotal ?? "-"}</span>
        </div>
      </div>

      <!-- TEAM 2 -->
      <div class="team-line">
        <div class="team-name">
          <img src="${homeLogo}" class="team-logo" />
          ${homeName}
        </div>
        <div class="team-score-block">
          <span class="half-score">${home1 ?? "-"}</span>
          <span class="half-score">${home2 ?? "-"}</span>
          <span class="half-score">${homeOT ?? "-"}</span>
          <span class="team-score">${homeTotal ?? "-"}</span>
        </div>
      </div>

      <!-- TOTALS ROW -->
      <div class="totals-row">
        <span class="totals-label">Totals:</span>
        <span>${total1}</span>
        <span>${total2}</span>
        <span>${totalOT}</span>
        <span>${totalGame}</span>
      </div>

      <!-- ⭐ NEW PACE ROW -->
      <div class="pace-row pace-block"></div>

      <!-- STATUS -->
      <div class="status ${status?.type?.state === "in" ? "live" : ""}">
        ${status?.type?.shortDetail || ""}
      </div>

      <!-- O/U INPUTS -->
      <div class="ou-section">
        ${renderOUSection(game.id)}
      </div>

    </div>
  `;

  return card;
}

/* -------------------------------
   RENDER O/U INPUT SECTION
--------------------------------*/
function renderOUSection(gameId) {
  return `
    <div class="ou-row">
      <label>Game O/U</label>
      <input type="number" step="0.5" id="full-line-${gameId}"
             oninput="updateUserBet('${gameId}','full','line',this.value)" />
      <select id="full-side-${gameId}"
              onchange="updateUserBet('${gameId}','full','side',this.value)">
        <option value=""></option>
        <option value="over">Over</option>
        <option value="under">Under</option>
      </select>
      <div id="trend-full-${gameId}" class="trend-dot"></div>
    </div>

    <div class="ou-row">
      <label>1H O/U</label>
      <input type="number" step="0.5" id="half1-line-${gameId}"
             oninput="updateUserBet('${gameId}','half1','line',this.value)" />
      <select id="half1-side-${gameId}"
              onchange="updateUserBet('${gameId}','half1','side',this.value)">
        <option value=""></option>
        <option value="over">Over</option>
        <option value="under">Under</option>
      </select>
      <div id="trend-half1-${gameId}" class="trend-dot"></div>
    </div>

    <div class="ou-row">
      <label>2H O/U</label>
      <input type="number" step="0.5" id="half2-line-${gameId}"
             oninput="updateUserBet('${gameId}','half2','line',this.value)" />
      <select id="half2-side-${gameId}"
              onchange="updateUserBet('${gameId}','half2','side',this.value)">
        <option value=""></option>
        <option value="over">Over</option>
        <option value="under">Under</option>
      </select>
      <div id="trend-half2-${gameId}" class="trend-dot"></div>
    </div>

    <div class="ou-graph">
      <canvas id="graph-full-${gameId}" width="300" height="80"></canvas>
      <canvas id="graph-half1-${gameId}" width="300" height="80"></canvas>
      <canvas id="graph-half2-${gameId}" width="300" height="80"></canvas>
    </div>
  `;
}
</script>



  <script>

/* ---------------------------------------------------
   USER BET STORAGE
--------------------------------------------------- */
function updateUserBet(gameId, segment, field, value) {
  if (!userBets[gameId]) userBets[gameId] = {};
  if (!userBets[gameId][segment]) userBets[gameId][segment] = {};
  userBets[gameId][segment][field] = value;
  updateTrendsForGame(gameId);
}

/* ---------------------------------------------------
   UPDATE ALL TRENDS
--------------------------------------------------- */
function updateAllTrends() {
  Object.keys(scoreboardGames).forEach(id => updateTrendsForGame(id));
}

/* ---------------------------------------------------
   UPDATE TRENDS FOR ONE GAME
--------------------------------------------------- */
function updateTrendsForGame(gameId) {
  const game = scoreboardGames[gameId];
  if (!game) return;

  const comp = game.competitions?.[0];
  const status = comp?.status;
  const period = status?.period || 1;

  const teams = comp?.competitors || [];
  const away = teams.find(t => t.homeAway === "away") || teams[0];
  const home = teams.find(t => t.homeAway === "home") || teams[1];

  const awayTotal = parseInt(away?.score ?? 0);
  const homeTotal = parseInt(home?.score ?? 0);
  const currentTotal = awayTotal + homeTotal;

  const minutesPlayed = computeMinutesPlayed(status);

  const state = {
    currentTotal,
    minutesPlayed
  };

  updatePaceRow(gameId, state, status, comp);

  updateTrendDot(gameId, "full", state);
  updateTrendDot(gameId, "half1", state);
  updateTrendDot(gameId, "half2", state);

  updateGraphs(gameId, state);
}

/* ---------------------------------------------------
   COMPUTE MINUTES PLAYED (WITH OT SUPPORT)
--------------------------------------------------- */
function computeMinutesPlayed(status) {
  if (!status) return 0;

  const period = status.period || 1;
  const clock = status.displayClock || "0:00";

  const [minStr, secStr] = clock.split(":");
  const secondsLeft = parseInt(minStr) * 60 + parseInt(secStr);
  const minutesLeft = secondsLeft / 60;

  if (period === 1) {
    return 20 - minutesLeft;
  }

  if (period === 2) {
    return 20 + (20 - minutesLeft);
  }

  // OT periods
  const otIndex = period - 2; // period 3 = OT1
  return 40 + (5 * (otIndex - 1)) + (5 - minutesLeft);
}

/* ---------------------------------------------------
   UPDATE PACE ROW (1H Pace | 2H+OT Pace | Game Pace)
--------------------------------------------------- */
function updatePaceRow(gameId, state, status, comp) {
  const card = document.querySelector(`[data-game-id="${gameId}"]`);
  if (!card) return;

  const paceRow = card.querySelector(".pace-row");
  if (!paceRow) return;

  const period = status?.period || 1;
  const minutesPlayed = state.minutesPlayed;
  const currentTotal = state.currentTotal;

  const teams = comp?.competitors || [];
  const away = teams.find(t => t.homeAway === "away") || teams[0];
  const home = teams.find(t => t.homeAway === "home") || teams[1];

  const awayLines = away?.linescores || [];
  const homeLines = home?.linescores || [];

  const away1 = awayLines[0]?.value ?? 0;
  const home1 = homeLines[0]?.value ?? 0;
  const firstHalfTotal = away1 + home1;

  const away2 = awayLines[1]?.value ?? 0;
  const home2 = homeLines[1]?.value ?? 0;
  const secondHalfTotal = away2 + home2;

  const awayOT = awayLines[2]?.value ?? 0;
  const homeOT = homeLines[2]?.value ?? 0;
  const otTotal = awayOT + homeOT;

  /* -------------------------
     1H PACE (always frozen)
  ------------------------- */
  let pace1 = null;
  if (firstHalfTotal > 0) {
    pace1 = Math.round(firstHalfTotal * (40 / 20));
  }

  /* -------------------------
     2H PACE (includes OT)
  ------------------------- */
  let pace2 = null;
  if (minutesPlayed > 20) {
    const minutesIn2H = minutesPlayed - 20;
    const points2HplusOT = currentTotal - firstHalfTotal;

    if (minutesIn2H > 0) {
      pace2 = Math.round(points2HplusOT * (40 / minutesIn2H));
    }
  }

  /* -------------------------
     GAME PACE (includes OT)
  ------------------------- */
  let paceGame = null;
  if (minutesPlayed > 0) {
    paceGame = Math.round(currentTotal * (40 / minutesPlayed));
  }

  /* -------------------------
     RENDER PACE ROW
  ------------------------- */
  paceRow.innerHTML = `
    <span class="pace-label">Pace:</span>
    <span>${pace1 ?? "-"}</span>
    <span>${pace2 ?? "-"}</span>
    <span>${paceGame ?? "-"}</span>
  `;
}

/* ---------------------------------------------------
   TREND DOT LOGIC
--------------------------------------------------- */
function updateTrendDot(gameId, segment, state) {
  const bet = userBets[gameId]?.[segment];
  if (!bet || !bet.line || !bet.side) return;

  const dot = document.getElementById(`trend-${segment}-${gameId}`);
  if (!dot) return;

  const line = parseFloat(bet.line);
  const side = bet.side;
  const total = state.currentTotal;

  if (side === "over") {
    dot.className = total > line ? "trend-dot green" : "trend-dot red";
  } else {
    dot.className = total < line ? "trend-dot green" : "trend-dot red";
  }
}

/* ---------------------------------------------------
   GRAPH UPDATES (unchanged)
--------------------------------------------------- */
function updateGraphs(gameId, state) {
  // Placeholder — your existing graph logic stays intact
}

/* ---------------------------------------------------
   START AUTO REFRESH
--------------------------------------------------- */
initDate();
loadScoreboard();
autoRefresh = setInterval(loadScoreboard, 5000);

</script>
</body>
</html>
